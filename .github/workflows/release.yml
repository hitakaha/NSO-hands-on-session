# Tag v* — CI must pass before any publish step (Story 6.9 AC6).
# Order: prepare notes → mike → PDF artifact → GitHub Release → CHANGELOG on main.
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      check_pr_title: false

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare release notes, checklist, CHANGELOG (Story 6.9)
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/ci/github_release_prepare.py \
            --notes-out release-body.md \
            --checklist-out "release-checklist-${GITHUB_REF_NAME}.md" \
            --update-changelog
          cp CHANGELOG.md /tmp/CHANGELOG.release.md

      - name: Public site URL (mike)
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "SITE_URL=https://${OWNER}.github.io/${REPO}/" >> "$GITHUB_ENV"

      - name: Git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mike deploy (semver from tag → latest alias + default)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          mike deploy --push --ignore-remote-status "$VERSION" latest --update-aliases
          mike set-default --push --ignore-remote-status "$VERSION"

      - uses: actions/download-artifact@v4
        with:
          name: learner-pdf
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: |
            dist/*.pdf
            release-checklist-${{ github.ref_name }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md to main
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cp /tmp/CHANGELOG.release.md CHANGELOG.md
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No CHANGELOG update to commit."
            exit 0
          fi
          git commit -m "docs(changelog): ${{ github.ref_name }}"
          git push origin main
